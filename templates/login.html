<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% if error %}
<h1>{{ error }}</h1>
{% endif %}
<form action="/login/" method="post">
    {% csrf_token %}
    <label>Login</label>
    <input type="text" name="login">
    <label>Password</label>
    <input type="password" name="password">
    <br>
    <input type="submit">
</form>
</body>
</html>
